<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PanganFlow.ID Preview</title>
  <style>
    body { margin:0; font-family: Georgia, "Times New Roman", serif; background:#fbfaf5; color:#172226; }
    main { max-width:1100px; margin:0 auto; padding:32px 20px; }
    h1 { margin:0 0 8px; font-size:34px; }
    .grid { display:grid; grid-template-columns:1.3fr 1fr; gap:20px; align-items:start; }
    .panel { background:#fffdf8; border:1px solid #d8d0c1; padding:16px; }
    img { width:100%; display:block; border:1px solid #d8d0c1; background:white; }
    p { color:#60737b; }
  </style>
</head>
<body>
  <main>
    <h1>PanganFlow.ID</h1>
    <p>Static preview memakai figure yang dihasilkan oleh pipeline.</p>
    <div class="grid">
      <section class="panel"><img src="../reports/figures/dashboard_preview.png" alt="Dashboard preview"></section>
      <section class="panel"><img src="../reports/figures/top_flow_recommendations.png" alt="Top flow recommendations"></section>
    </div>
  </main>
</body>
</html>
